<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>snip — URL Shortener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0E0E0F;
      --surface:   #1A1A1B;
      --border:    #2E2E30;
      --accent:    #5BF5A2;
      --accent-dim:#1a4a33;
      --text:      #E8E8E8;
      --muted:     #777;
      --error:     #FF6B6B;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', sans-serif;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      padding: 0 20px;
    }

    /* ── Layout ── */
    .page {
      max-width: 680px;
      margin: 0 auto;
      padding: 64px 0 80px;
    }

    /* ── Header ── */
    header {
      margin-bottom: 48px;
    }

    .wordmark {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: clamp(28px, 5vw, 40px);
      font-weight: 600;
      color: var(--text);
      line-height: 1.15;
      letter-spacing: -0.02em;
    }

    header p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── Input row ── */
    .input-row {
      display: flex;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    .prompt-glyph {
      font-family: var(--mono);
      font-size: 18px;
      color: var(--accent);
      padding: 0 0 0 16px;
      user-select: none;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 1px;
    }

    #url-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13.5px;
      padding: 14px 12px;
      caret-color: var(--accent);
    }

    #url-input::placeholder {
      color: var(--muted);
    }

    .shorten-btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 0 20px;
      height: 100%;
      min-height: 48px;
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
      border-radius: 0 4px 4px 0;
    }

    .shorten-btn:hover { opacity: 0.85; }
    .shorten-btn:active { opacity: 0.7; }

    /* ── Result block ── */
    #result {
      margin-top: 6px;
      min-height: 0;
    }

    .result-inner {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-label {
      font-size: 11px;
      font-family: var(--mono);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .result-link-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .result-url {
      font-family: var(--mono);
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .result-url:hover {
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    .copy-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .copy-btn:hover {
      color: var(--accent);
      border-color: var(--accent);
    }

    .copy-btn.copied {
      color: var(--accent);
      border-color: var(--accent-dim);
      background: var(--accent-dim);
    }

    .error-msg {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--error);
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    /* ── Links table ── */
    .links-section {
      margin-top: 44px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
      padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
    }

    thead th:last-child { text-align: right; }

    tbody tr {
      border-bottom: 1px solid #1f1f20;
      transition: background 0.1s;
    }

    tbody tr:hover {
      background: var(--surface);
    }

    tbody td {
      padding: 11px 0;
      vertical-align: middle;
      font-size: 13.5px;
    }

    tbody td:last-child {
      text-align: right;
    }

    .td-code a {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .td-code a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .td-url {
      max-width: 340px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12.5px;
      padding-left: 24px;
      padding-right: 24px;
    }

    .td-clicks {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text);
    }

    .empty-state {
      padding: 24px 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .td-url { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="wordmark">NUKG</div>
      <h1>Short links,<br>Easy to Share</h1>
      <p>Paste a URL. Get something you can actually share.</p>
    </header>

    <div class="input-row">
      <span class="prompt-glyph">›</span>
      <input type="text" id="url-input" placeholder="https://your-very-long-url.com/goes/here" autocomplete="off" spellcheck="false">
      <button class="shorten-btn" onclick="shortenURL()">Shorten</button>
    </div>

    <div id="result"></div>

    <div class="links-section">
      <div class="section-header">
        <span class="section-title">All links</span>
        <div class="section-rule"></div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Code</th>
            <th>Original URL</th>
            <th>Clicks</th>
          </tr>
        </thead>
        <tbody id="stats-body">
          <tr><td colspan="3" class="empty-state">No links yet.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function shortenURL() {
      const url = document.getElementById("url-input").value.trim();
      const resultDiv = document.getElementById("result");

      const res = await fetch("/shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url })
      });

      const data = await res.json();

      if (!res.ok) {
        resultDiv.innerHTML = `<div class="error-msg">⚠ ${data.error}</div>`;
        return;
      }

      const shortUrl = data.short_url;
      resultDiv.innerHTML = `
        <div class="result-inner">
          <div class="result-label">Your short link</div>
          <div class="result-link-row">
            <a class="result-url" href="${shortUrl}" target="_blank">${shortUrl}</a>
            <button class="copy-btn" id="copy-btn" onclick="copyLink('${shortUrl}')">Copy</button>
          </div>
        </div>
      `;
      loadStats();
    }

    function copyLink(url) {
      navigator.clipboard.writeText(url).then(() => {
        const btn = document.getElementById("copy-btn");
        btn.textContent = "Copied";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    async function loadStats() {
      const res = await fetch("/stats");
      const data = await res.json();
      const tbody = document.getElementById("stats-body");

      if (!data.length) {
        tbody.innerHTML = `<tr><td colspan="3" class="empty-state">No links yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(row => `
        <tr>
          <td class="td-code"><a href="/r/${row.code}" target="_blank">${row.code}</a></td>
          <td class="td-url" title="${row.url}">${row.url}</td>
          <td class="td-clicks">${row.clicks}</td>
        </tr>
      `).join("");
    }

    loadStats();

    // Submit on Enter
    document.getElementById("url-input").addEventListener("keydown", e => {
      if (e.key === "Enter") shortenURL();
    });
  </script>
</body>
</html>
